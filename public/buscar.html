<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pide tu canción</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap');
  html, body { width: 100%; overflow-x: hidden; box-sizing: border-box; }
  body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(212,175,55,0.08), transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(29,185,84,0.10), transparent 45%),
      #0d0d0d;
    color: #fff;
    min-height: 100vh;
    padding: 20px 16px 100px;
    max-width: 480px;
    margin: 0 auto;
  }
  .eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #D4AF37; margin-bottom: 6px; font-weight: 500; }
  h1 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; }
  input {
    width: 100%; padding: 16px 20px; border-radius: 30px; border: 1px solid #2a2a2a;
    font-size: 15px; background: #161616; color: #fff; outline: none;
  }
  input:focus { border-color: #D4AF37; }
  .results { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .track {
    display: flex; align-items: center; gap: 14px; padding: 10px 12px; border-radius: 12px;
    background: #161616; border: 1px solid transparent; cursor: pointer;
  }
  .track img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #222; }
  .track .info { flex: 1; overflow: hidden; }
  .track .name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track .artist { font-size: 12.5px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .track .add-icon {
    width: 30px; height: 30px; border-radius: 50%; background: rgba(29,185,84,0.15); color: #1DB954;
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .section-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: #D4AF37; margin: 18px 0 10px; font-weight: 600; }
  .loading { color: #999; margin-top: 10px; font-size: 13px; }
  .queue-panel {
    margin-top: 26px; background: #141414; border: 1px solid rgba(212,175,55,0.25);
    border-radius: 16px; padding: 18px; display: none;
  }
  .queue-panel .now-playing { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid #262626; }
  .queue-panel .now-playing img { width: 42px; height: 42px; border-radius: 8px; background: #222; }
  .queue-panel .now-playing .label { font-size: 10px; letter-spacing: 1px; color: #1DB954; text-transform: uppercase; }
  .queue-panel .now-playing .title { font-size: 13.5px; font-weight: 500; }
  .queue-panel .now-playing .sub { font-size: 12px; color: #999; }
  .queue-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; }
  .queue-item .pos {
    width: 22px; height: 22px; border-radius: 50%; background: #222; color: #999; font-size: 11px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .queue-item.highlight { background: rgba(29,185,84,0.1); border-radius: 10px; padding: 8px 10px; margin: 0 -10px; }
  .queue-item.highlight .pos { background: #1DB954; color: #000; font-weight: 700; }
  .queue-item.highlight .qname { color: #1DB954; font-weight: 600; }
  .queue-item .qname { color: #eee; }
  .queue-item .qartist { color: #888; font-size: 11.5px; }
  .status {
    position: fixed; bottom: 20px; left: 20px; right: 20px;
    background: linear-gradient(90deg, #1DB954, #17a94a); color: #000; font-weight: 600;
    text-align: center; padding: 15px; border-radius: 14px; display: none; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
  <div class="eyebrow">Tu turno</div>
  <h1>🎵 Escribe una canción o artista</h1>
  <input id="q" type="text" placeholder="Ej. Jerry Rivera" autofocus>
  <div class="loading" id="loading"></div>
  <div class="results" id="results"></div>
  <div class="queue-panel" id="queuePanel"></div>
  <div class="status" id="status"></div>

<script>
const q = document.getElementById('q');
const results = document.getElementById('results');
const loading = document.getElementById('loading');
const status = document.getElementById('status');
const queuePanel = document.getElementById('queuePanel');
let timer = null;
let lastAddedUri = null;
let refreshInterval = null;

q.addEventListener('input', () => {
  clearTimeout(timer);
  const query = q.value.trim();
  results.innerHTML = '';
  if (query.length < 2) return;
  loading.textContent = 'Buscando...';
  timer = setTimeout(() => search(query), 400);
});

async function search(query) {
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(query));
    const data = await res.json();
    loading.textContent = '';
    if (!data.tracks || data.tracks.length === 0) {
      results.innerHTML = '<p style="color:#999">No se encontraron canciones.</p>';
      return;
    }
    results.innerHTML = '';
    data.tracks.forEach(track => {
      const div = document.createElement('div');
      div.className = 'track';
      div.innerHTML = `
        <img src="${track.image || ''}" alt="">
        <div class="info">
          <div class="name">${track.name}</div>
          <div class="artist">${track.artist}</div>
        </div>
        <div class="add-icon">＋</div>
      `;
      div.onclick = () => addToQueue(track.uri, track.name);
      results.appendChild(div);
    });
  } catch (e) {
    loading.textContent = 'Error al buscar. Intenta de nuevo.';
  }
}

async function addToQueue(uri, name) {
  showStatus('Agregando "' + name + '"...');
  try {
    const res = await fetch('/api/queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uri })
    });
    if (res.ok) {
      showStatus('✅ "' + name + '" agregada a la fila');
      lastAddedUri = uri;
      setTimeout(loadQueueStatus, 1200);
      startAutoRefresh();
    } else {
      showStatus('❌ No se pudo agregar. Intenta otra vez.');
    }
  } catch (e) {
    showStatus('❌ Error de conexión.');
  }
}

async function loadQueueStatus() {
  try {
    const res = await fetch('/api/queue-status');
    if (!res.ok) return;
    const data = await res.json();
    renderQueue(data);
  } catch (e) {}
}

function startAutoRefresh() {
  if (refreshInterval) return;
  refreshInterval = setInterval(loadQueueStatus, 10000);
}

function renderQueue(data) {
  let html = '';
  if (data.currentlyPlaying) {
    html += `
      <div class="now-playing">
        <img src="${data.currentlyPlaying.image || ''}" alt="">
        <div>
          <div class="label">Sonando ahora</div>
          <div class="title">${data.currentlyPlaying.name}</div>
          <div class="sub">${data.currentlyPlaying.artist}</div>
        </div>
      </div>
    `;
  }
  html += '<div class="section-label" style="margin-top:0;">En la fila</div>';
  (data.queue || []).slice(0, 15).forEach((t, i) => {
    const isMine = lastAddedUri && t.uri === lastAddedUri;
    html += `
      <div class="queue-item ${isMine ? 'highlight' : ''}">
        <div class="pos">${i + 1}</div>
        <div>
          <div class="qname">${t.name}${isMine ? ' ✅ (tu canción)' : ''}</div>
          <div class="qartist">${t.artist}</div>
        </div>
      </div>
    `;
  });
  queuePanel.innerHTML = html;
  queuePanel.style.display = 'block';
}

function showStatus(msg) {
  status.textContent = msg;
  status.style.display = 'flex';
  setTimeout(() => { status.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
