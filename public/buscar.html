<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pide tu canción</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; overflow-x: hidden; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #121212;
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { font-size: 20px; margin-bottom: 16px; }
  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    background: #242424;
    color: #fff;
    outline: none;
  }
  .results { margin-top: 16px; }
  .track {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: #1a1a1a;
    cursor: pointer;
  }
  .track img { width: 48px; height: 48px; border-radius: 6px; background: #333; }
  .track .info { flex: 1; overflow: hidden; }
  .track .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track .artist { font-size: 13px; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: #1DB954;
    color: #000;
    font-weight: 700;
    text-align: center;
    padding: 14px;
    border-radius: 12px;
    display: none;
  }
  .loading { color: #999; margin-top: 12px; font-size: 14px; }
</style>
</head>
<body>
  <h1>🎵 Escribe el nombre de tu canción o artista</h1>
  <input id="q" type="text" placeholder="Ej. Jerry Rivera" autofocus>
  <div class="loading" id="loading"></div>
  <div class="results" id="results"></div>
  <div class="status" id="status"></div>

<script>
console.log('Script cargado correctamente');

const q = document.getElementById('q');
const results = document.getElementById('results');
const loading = document.getElementById('loading');
const status = document.getElementById('status');
let timer = null;

q.addEventListener('input', () => {
  console.log('Input detectado:', q.value);
  clearTimeout(timer);
  const query = q.value.trim();
  results.innerHTML = '';
  if (query.length < 2) return;
  loading.textContent = 'Buscando...';
  timer = setTimeout(() => search(query), 400);
});

async function search(query) {
  console.log('Buscando:', query);
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(query));
    console.log('Respuesta recibida, status:', res.status);
    const data = await res.json();
    console.log('Datos:', data);
    loading.textContent = '';
    if (!data.tracks || data.tracks.length === 0) {
      results.innerHTML = '<p style="color:#999">No se encontraron canciones.</p>';
      return;
    }
    results.innerHTML = '';
    data.tracks.forEach(track => {
      const div = document.createElement('div');
      div.className = 'track';
      div.innerHTML = `
        <img src="${track.image || ''}" alt="">
        <div class="info">
          <div class="name">${track.name}</div>
          <div class="artist">${track.artist}</div>
        </div>
      `;
      div.onclick = () => addToQueue(track.uri, track.name);
      results.appendChild(div);
    });
  } catch (e) {
    console.error('Error en búsqueda:', e);
    loading.textContent = 'Error al buscar. Intenta de nuevo.';
  }
}

async function addToQueue(uri, name) {
  showStatus('Agregando "' + name + '"...');
  try {
    const res = await fetch('/api/queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uri })
    });
    if (res.ok) {
      showStatus('✅ "' + name + '" agregada a la fila');
    } else {
      showStatus('❌ No se pudo agregar. Intenta otra vez.');
    }
  } catch (e) {
    showStatus('❌ Error de conexión.');
  }
}

function showStatus(msg) {
  status.textContent = msg;
  status.style.display = 'block';
  setTimeout(() => { status.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
